<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="finances.json">
    <title>My Finances — Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card login-card">
        <div class="card-header">
            <div class="accent-line"></div>
            <h1>My Finances</h1>
            <p>Sign in to continue</p>
            <span class="version">v1.1.0</span>
        </div>

        <div class="offline-login-msg" id="offlineLoginMsg">
            📡 You're offline.<br>
            Please connect to sign in for the first time.
        </div>

        <div id="loginContent">

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="your@email.com"
                       autocomplete="email" inputmode="email" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••"
                       autocomplete="current-password" />
            </div>

            <div class="form-actions">
                <button class="btn-submit" id="loginBtn">Sign In</button>
                <button class="btn-secondary" id="forgotBtn">Forgot password?</button>
                <button class="btn-secondary" id="signupBtn">Sign up</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="login.js"></script>
</body>
</html>
